name: India EOD Export (NSE)

on:
  # NSE closes at 3:30 PM IST = 10:00 AM UTC. Export runs at 10:15 AM UTC.
  schedule:
    - cron: '15 10 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-india-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-india-

      - name: Export dashboard data
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scripts.export_dashboard

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-india-${{ github.run_id }}-${{ github.run_attempt }}
