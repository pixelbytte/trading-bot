name: Pre-market Sentiment Scan

on:
  # 13:30 UTC = 9:30am ET — runs just before market open Mon-Fri
  # Scores news sentiment for all watchlist tickers before intraday cycles fire
  schedule:
    - cron: '30 13 * * 1-5'

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-

      - name: Run pre-market scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python -m routines.premarket

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
