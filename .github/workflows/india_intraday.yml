name: India Intraday (NSE)

on:
  # NSE hours: 9:30 AM – 3:15 PM IST = 4:00 AM – 9:45 AM UTC
  # Runs every 15 min during market hours. India has no DST (always UTC+5:30).
  schedule:
    - cron: '*/15 4-9 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-india-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-india-

      - name: Run India intraday
        env:
          # Set INDIA_PAPER=false in GitHub Secrets when ready to go live
          INDIA_PAPER:         ${{ secrets.INDIA_PAPER || 'true' }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          UPSTOX_CLIENT_ID:    ${{ secrets.UPSTOX_CLIENT_ID }}
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m routines.india_intraday

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-india-${{ github.run_id }}-${{ github.run_attempt }}
