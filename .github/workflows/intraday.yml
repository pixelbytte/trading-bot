name: Intraday Trading

on:
  # Run every 15 minutes during US market hours (Mon-Fri)
  # Cron is in UTC: 9:30am ET = 13:30 UTC (winter) / 14:30 UTC (DST adjustment)
  # We run 14:00 - 21:00 UTC every 15 min to cover both DST states
  schedule:
    - cron: '*/15 14-21 * * 1-5'

  # Allow manual triggering for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-

      - name: Run intraday routine
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m routines.intraday

      - name: Refresh dashboard data
        if: always()
        run: python -m scripts.export_dashboard

      - name: Commit dashboard data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: live dashboard refresh [skip ci]"
          git push || true

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}