name: Long-Term Portfolio Scan

on:
  schedule:
    # 13:35 UTC = 9:35am ET. Runs once at market open, Mon-Fri.
    # 5-minute buffer after open lets the opening price settle.
    - cron: "35 13 * * 1-5"
  workflow_dispatch:

jobs:
  longterm-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-

      - name: Run long-term scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: python -m routines.longterm

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
