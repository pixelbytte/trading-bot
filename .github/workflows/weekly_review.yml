name: Weekly Trading Review

on:
  schedule:
    # 21:00 UTC = 5:00 PM ET (accounts for DST). Runs every Sunday.
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot.db
        uses: actions/cache/restore@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-db-

      - name: Run weekly review
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python -m routines.weekly_review

      - name: Save bot.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}-${{ github.run_attempt }}
