name: Sunday Thesis Generation

on:
  schedule:
    # 11:00 UTC = 7:00am ET. Runs every Sunday morning.
    # Runs before the weekly review (21:00 UTC) so thesis scores are ready.
    - cron: "0 11 * * 0"
  workflow_dispatch:

jobs:
  generate-thesis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run thesis generation
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: python -m routines.thesis
